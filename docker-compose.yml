version: "3.9"

services:
  backend:
    build: ./backend
    container_name: animal-center-backend
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: animal-center-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080/api
    depends_on:
      - backend
