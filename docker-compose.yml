services:
  backend:
    build: ./backend
    container_name: animal-center-backend
    ports:
      - "8080:8080"
    environment:
      ML_SERVICE_URL: http://ml-service:8000
      DATA_FILE: data/animals.json
    volumes:
      - ./backend/data:/app/data

  frontend:
    build: ./frontend
    container_name: animal-center-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080/api
    depends_on:
      - backend

  ml-service:
    build: ./ml-service
    container_name: animal-center-ml
    ports:
      - "8000:8000"
